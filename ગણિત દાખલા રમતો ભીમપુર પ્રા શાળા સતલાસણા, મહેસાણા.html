<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ગણિતની રમત - બાળકો માટે</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mukta+Vaani:wght@400;700&display=swap');

        body {
            font-family: 'Mukta Vaani', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); /* Default Blue */
            margin: 0;
            padding: 0; 
            color: #333;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background 0.5s ease; /* સ્મૂથ કલર ચેન્જ માટે */
        }

        .container {
            width: 100%;
            max-width: 600px; 
            background-color: rgba(244, 247, 246, 0.95);
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            position: relative; 
        }

        /* Top Bar: Back, Music, Theme */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .action-btn {
            background-color: #fff;
            color: #333;
            border: 2px solid #ccc;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0px #ccc;
            transition: all 0.1s;
        }

        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0px #ccc;
        }

        .theme-select {
            padding: 6px;
            border-radius: 8px;
            border: 2px solid #ccc;
            font-weight: bold;
            outline: none;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 3px dashed #ff6b6b;
            padding-bottom: 10px;
        }

        h1 {
            color: #ff6b6b;
            margin: 0;
            font-size: 2em;
            text-shadow: 1px 1px 0px #ffe6e6;
        }

        .creator-info {
            font-size: 1.1em;
            color: #2980b9;
            font-weight: bold;
            margin-top: 8px;
        }

        .school-info {
            font-size: 1.1em;
            color: #d35400;
            font-weight: bold;
            margin-top: 5px;
            padding: 5px;
            border: 1px dashed #ccc;
            border-radius: 8px;
            outline: none;
            background-color: #fff;
            transition: all 0.3s;
        }

        .dashboard {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 12px 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2em;
            font-weight: bold;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        .score-box {
            background-color: #ff9f43;
            padding: 5px 15px;
            border-radius: 8px;
            box-shadow: 0 4px 0px #e67e22;
            font-size: 1.2em; /* મોટો સ્કોર */
        }

        .score-number {
            font-size: 1.5em;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }

        .blink {
            animation: blinker 1.5s linear infinite;
            color: #ffd700;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

        .controls {
            display: flex;
            flex-direction: column; 
            gap: 10px;
            margin-bottom: 15px;
        }

        .controls select, .controls button {
            width: 100%;
            padding: 12px;
            font-size: 1.1em;
            border-radius: 10px;
            border: 2px solid #ccc;
            outline: none;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 0px #ccc;
            box-sizing: border-box;
        }

        .start-btn {
            background-color: #1dd1a1 !important;
            border-color: #10ac84 !important;
            color: white;
            font-weight: bold;
            box-shadow: 0 5px 0px #10ac84 !important;
            font-size: 1.2em;
        }

        .start-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0px #10ac84 !important;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px;
            padding: 5px;
        }

        .math-card {
            background-color: white;
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.8em;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 6px 0px #bdc3c7;
            border: 2px solid #ecf0f1;
            color: #2c3e50;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .math-card:active:not(.solved) {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #bdc3c7;
        }

        .math-card.solved {
            background-color: #1dd1a1;
            color: white;
            border-color: #10ac84;
            box-shadow: 0 4px 0px #10ac84;
            pointer-events: none;
            font-size: 1.3em;
        }

        /* Modal / Popup Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: white;
            margin: 30% auto;
            padding: 25px;
            border-radius: 20px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 15px 0px #7f8c8d;
            position: relative;
            animation: popUp 0.3s ease-out;
        }

        @keyframes popUp {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 15px;
            font-size: 35px;
            font-weight: bold;
            color: #e74c3c;
            cursor: pointer;
            border: none;
            background: none;
        }

        .modal-problem {
            font-size: 3em;
            margin: 15px 0 15px 0;
            color: #2980b9;
        }

        /* Text Input Design */
        .answer-input {
            width: 80%;
            font-size: 2em;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            border: 3px solid #3498db;
            margin-bottom: 20px;
            outline: none;
            color: #2c3e50;
            font-weight: bold;
        }

        .answer-input:focus {
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
        }

        .submit-btn {
            background-color: #3498db;
            color: white;
            font-size: 1.5em;
            padding: 10px 20px;
            border-radius: 12px;
            border: none;
            box-shadow: 0 5px 0px #2980b9;
            cursor: pointer;
            width: 80%;
            font-weight: bold;
        }

        .submit-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0px #2980b9;
        }

        /* Custom Alert / Motivation Toast */
        .toast {
            display: none;
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ff4757;
            color: white;
            padding: 20px 30px;
            border-radius: 15px;
            font-size: 1.8em;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 2000;
            text-align: center;
            animation: popUp 0.3s ease-out;
            width: 80%;
            max-width: 300px;
        }

        .toast.success { background-color: #2ed573; }
        .toast.error { background-color: #ff4757; }
        
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <div class="top-bar">
        <button class="action-btn" onclick="goBack()">⬅ પાછા જાવ</button>
        
        <button class="action-btn" id="musicBtn" onclick="toggleMusic()">🔇 મ્યુઝિક</button>
        
        <select class="theme-select" id="themeSelect" onchange="changeTheme()">
            <option value="blue">🌊 વાદળી (Blue)</option>
            <option value="green">🍃 લીલો (Green)</option>
            <option value="pink">🌸 ગુલાબી (Pink)</option>
            <option value="purple">🌌 જાંબલી (Purple)</option>
            <option value="orange">🌅 નારંગી (Orange)</option>
        </select>
    </div>

    <header>
        <h1>રમત ગમત માં ગણિત</h1>
        <div class="creator-info">ક્રિએટર: ભરતસિંહ સી. ચૌહાણ</div>
        <div contenteditable="true" class="school-info">શ્રી ભીમપુર અનુપમ પ્રા શાળા પી એમ શ્રી ગુજરાત સતલાસણા મહેસાણા</div>
    </header>

    <div class="dashboard">
        <div class="score-box">સ્કોર: <span id="scoreDisplay" class="score-number">0</span></div>
        <div>મિત્રો: <span id="onlineCount" class="blink">0</span></div>
    </div>

    <div class="controls">
        <select id="gradeSelect">
            <option value="1">ધોરણ 1</option>
            <option value="2">ધોરણ 2</option>
            <option value="3">ધોરણ 3</option>
            <option value="4">ધોરણ 4</option>
            <option value="5">ધોરણ 5</option>
            <option value="6">ધોરણ 6</option>
            <option value="7">ધોરણ 7</option>
            <option value="8">ધોરણ 8</option>
        </select>

        <select id="operationSelect">
            <option value="+">સરવાળા (+)</option>
            <option value="-">બાદબાકી (-)</option>
            <option value="*">ગુણાકાર (×)</option>
            <option value="/">ભાગાકાર (÷)</option>
        </select>

        <button class="start-btn" onclick="startGame()">નવી રમત શરૂ કરો</button>
    </div>

    <div class="game-board" id="board">
        </div>
</div>

<div id="solveModal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <div id="modalProblem" class="modal-problem"></div>
        
        <input type="number" id="userAnswer" class="answer-input" placeholder="જવાબ લખો" autocomplete="off">
        <br>
        <button class="submit-btn" onclick="checkTypedAnswer()">જવાબ ચકાસો</button>
    </div>
</div>

<div id="customToast" class="toast"></div>

<script>
    // --- 1. થીમ કલર બદલવાનું ફંક્શન ---
    function changeTheme() {
        const theme = document.getElementById('themeSelect').value;
        const body = document.body;
        
        if(theme === 'blue') body.style.background = 'linear-gradient(135deg, #1e3c72 0%, #2a5298 100%)';
        if(theme === 'green') body.style.background = 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)';
        if(theme === 'pink') body.style.background = 'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)';
        if(theme === 'purple') body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
        if(theme === 'orange') body.style.background = 'linear-gradient(135deg, #f12711 0%, #f5af19 100%)';
    }

    // --- 2. બેકગ્રાઉન્ડ મ્યુઝિક ફંક્શન ---
    let isMusicPlaying = false;
    const bgMusic = document.getElementById('bgMusic');
    bgMusic.volume = 0.3; // અવાજ થોડો ધીમો રાખ્યો છે

    function toggleMusic() {
        const musicBtn = document.getElementById('musicBtn');
        if (isMusicPlaying) {
            bgMusic.pause();
            musicBtn.innerText = '🔇 મ્યુઝિક';
            isMusicPlaying = false;
        } else {
            bgMusic.play().catch(e => console.log("Music play blocked by browser"));
            musicBtn.innerText = '🔊 ચાલુ છે';
            isMusicPlaying = true;
        }
    }

    // --- 3. અવાજની ઇફેક્ટ (સાચું/ખોટું) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function playSound(isCorrect) {
        if (!audioCtx) audioCtx = new AudioContext(); 
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (isCorrect) {
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
            oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); 
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.3);
        } else {
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.3);
        }
    }

    // --- 4. અન્ય જરૂરી ફંક્શન ---
    function goBack() {
        if (window.history.length > 1) window.history.back();
        else alert("તમે મુખ્ય પેજ પર જ છો!");
    }

    function updateOnlineCount() {
        document.getElementById('onlineCount').innerText = Math.floor(Math.random() * (50 - 15 + 1)) + 15;
    }
    updateOnlineCount();
    setInterval(updateOnlineCount, 5000); 

    let currentAnswer = 0;
    let score = 0;
    let activeCard = null; 

    // પ્રોત્સાહક શબ્દોનું લિસ્ટ
    const motivationalQuotes = ["ખૂબ સરસ! 🎉", "શાબાશ! 🌟", "અદ્ભુત! 🚀", "વાહ! હોશિયાર છો! 🥇", "એકદમ સાચું! 🎯", "સુપર! 👏"];

    function showToast(message, type) {
        const toast = document.getElementById('customToast');
        toast.innerText = message;
        toast.className = 'toast ' + type;
        toast.style.display = 'block';
        
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000); // 2 સેકન્ડ પછી બંધ થશે
    }

    function startGame() {
        if (!audioCtx) {
            audioCtx = new AudioContext();
            audioCtx.resume();
        }
        score = 0;
        document.getElementById('scoreDisplay').innerText = score;
        generateBoard();
    }

    function generateBoard() {
        const board = document.getElementById('board');
        board.innerHTML = ''; 
        
        const grade = parseInt(document.getElementById('gradeSelect').value);
        const operation = document.getElementById('operationSelect').value;
        
        let maxNum = grade <= 3 ? 10 : (grade <= 5 ? 50 : 99); 

        for (let i = 0; i < 10; i++) { 
            let num1 = Math.floor(Math.random() * maxNum) + 1;
            let num2 = Math.floor(Math.random() * maxNum) + 1;

            if (operation === '-' && num1 < num2) {
                [num1, num2] = [num2, num1];
            } else if (operation === '/') {
                num1 = num1 * num2;
            }

            const card = document.createElement('div');
            card.className = 'math-card';
            
            let displayOp = operation;
            if(operation === '*') displayOp = '×';
            if(operation === '/') displayOp = '÷';

            card.innerHTML = `<span>${num1} ${displayOp} ${num2}</span>`;
            card.onclick = function() {
                openModal(num1, num2, operation, displayOp, this);
            };
            board.appendChild(card);
        }
    }

    function openModal(n1, n2, op, displayOp, cardElement) {
        activeCard = cardElement; 
        const modal = document.getElementById('solveModal');
        const problemDisplay = document.getElementById('modalProblem');
        const inputField = document.getElementById('userAnswer');
        
        problemDisplay.innerText = `${n1} ${displayOp} ${n2}`;
        inputField.value = ''; // જૂનો જવાબ ભૂંસી નાખો
        
        if (op === '+') currentAnswer = n1 + n2;
        if (op === '-') currentAnswer = n1 - n2;
        if (op === '*') currentAnswer = n1 * n2;
        if (op === '/') currentAnswer = n1 / n2;

        modal.style.display = 'block';
        inputField.focus(); // મોબાઈલમાં આપોઆપ કીબોર્ડ ખુલે તે માટે
    }

    // --- 5. સંખ્યા (જવાબ) ચેક કરવાનું ફંક્શન ---
    function checkTypedAnswer() {
        const userInput = document.getElementById('userAnswer').value;
        
        if(userInput === "") {
            showToast("કૃપા કરીને જવાબ લખો!", "error");
            return;
        }

        const userAns = parseFloat(userInput);

        if (userAns === currentAnswer) {
            playSound(true); 
            score += 10; 
            document.getElementById('scoreDisplay').innerText = score; // સ્કોર અપડેટ 
            
            activeCard.classList.add('solved');
            activeCard.innerHTML = '✔ સાચું';
            
            closeModal();
            
            // રેન્ડમ પ્રોત્સાહક શબ્દ બતાવો
            const randomQuote = motivationalQuotes[Math.floor(Math.random() * motivationalQuotes.length)];
            showToast(randomQuote, "success");

        } else {
            playSound(false); 
            // જો ખોટો જવાબ હોય તો સાચો જવાબ બતાવે
            showToast(`ખોટો જવાબ! ❌\nસાચો જવાબ: ${currentAnswer}`, "error");
            document.getElementById('userAnswer').value = ''; // બોક્સ ખાલી કરો
        }
    }

    function closeModal() {
        document.getElementById('solveModal').style.display = 'none';
    }

    window.onload = startGame;
</script>

</body>
</html>
