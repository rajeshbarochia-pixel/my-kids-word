<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>બાળકો માટે અરીસાની રમત</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: none;
            overflow: hidden;
            background-color: #f0f7ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        canvas {
            cursor: crosshair;
            touch-action: none;
            flex-grow: 1;
            z-index: 5;
            background-color: transparent;
        }
        /* મિરર લાઇન જે ટાઇટલની નીચેથી શરૂ થાય છે */
        .mirror-line {
            position: absolute;
            left: 50%;
            top: 110px; 
            bottom: 0;
            width: 4px;
            background: linear-gradient(to bottom, #3b82f6, #60a5fa, #3b82f6);
            transform: translateX(-50%);
            z-index: 10;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            border-radius: 2px;
        }
        .header-section {
            padding: 20px 10px;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 20;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .footer-credit {
            position: fixed;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            z-index: 30;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .controls-container {
            position: fixed;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            width: 95%;
            max-width: 450px;
        }
        .controls {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            padding: 12px 20px;
            border-radius: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        .color-dot {
            width: clamp(28px, 8vw, 36px);
            height: clamp(28px, 8vw, 36px);
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .color-dot.active {
            transform: scale(1.25);
            box-shadow: 0 0 0 3px #3b82f6;
        }
        /* રિસ્પોન્સિવ એડજસ્ટમેન્ટ્સ */
        @media (max-width: 480px) {
            .header-section { padding: 15px 5px; }
            .header-section h1 { font-size: 1.6rem; }
            .header-section p { font-size: 0.85rem; }
            .mirror-line { top: 95px; }
            .controls { padding: 8px 15px; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1 class="text-3xl font-bold text-blue-600 drop-shadow-sm">જાદુઈ અરીસો 🎨</h1>
        <p class="text-gray-500 font-medium">ડાબી બાજુ દોરો અને જાદુ જુઓ!</p>
    </div>

    <div class="mirror-line"></div>
    
    <canvas id="drawingCanvas"></canvas>

    <div class="controls-container">
        <div class="controls">
            <div class="flex gap-2 sm:gap-4 items-center">
                <div class="color-dot active" style="background-color: #ef4444;" onclick="setColor('#ef4444', this)"></div>
                <div class="color-dot" style="background-color: #22c55e;" onclick="setColor('#22c55e', this)"></div>
                <div class="color-dot" style="background-color: #3b82f6;" onclick="setColor('#3b82f6', this)"></div>
                <div class="color-dot" style="background-color: #eab308;" onclick="setColor('#eab308', this)"></div>
                <div class="color-dot" style="background-color: #a855f7;" onclick="setColor('#a855f7', this)"></div>
                <div class="color-dot" style="background-color: #000000;" onclick="setColor('#000000', this)"></div>
            </div>
            
            <button onclick="clearCanvas()" class="bg-red-500 hover:bg-red-600 text-white px-5 py-2.5 rounded-full text-sm font-bold transition-all shadow-md active:scale-95 flex items-center gap-1 shrink-0">
                <span>સાફ કરો</span> 🧹
            </button>
        </div>
    </div>

    <div class="footer-credit">Created by Rajesh Barochia</div>

    <script>
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let currentColor = '#ef4444';
        let brushSize = 6;

        function resize() {
            const headerHeight = document.querySelector('.header-section').offsetHeight;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - headerHeight;
            
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.lineWidth = brushSize;
        }

        window.addEventListener('resize', resize);
        window.onload = resize;

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getPos(e);
            const mid = canvas.width / 2;

            ctx.strokeStyle = currentColor;
            ctx.lineWidth = brushSize;

            // મૂળ રેખા
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();

            // અરીસામાં દેખાતી રેખા
            const mirroredLastX = mid + (mid - lastX);
            const mirroredPosX = mid + (mid - pos.x);

            ctx.beginPath();
            ctx.moveTo(mirroredLastX, lastY);
            ctx.lineTo(mirroredPosX, pos.y);
            ctx.stroke();

            lastX = pos.x;
            lastY = pos.y;
        }

        function stopDrawing() {
            isDrawing = false;
        }

        function setColor(color, el) {
            currentColor = color;
            document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
            el.classList.add('active');
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // માઉસ ઇવેન્ટ્સ
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);

        // ટચ ઇવેન્ટ્સ (મોબાઈલ માટે)
        canvas.addEventListener('touchstart', (e) => {
            if (e.target === canvas) e.preventDefault();
            startDrawing(e);
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            if (e.target === canvas) e.preventDefault();
            draw(e);
        }, { passive: false });
        
        window.addEventListener('touchend', stopDrawing);

    </script>
</body>
</html>
