<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>કલરફૂલ ગુજરાતી ટ્રાન્સલેટર</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans Gujarati', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            margin: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 480px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .input-box {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 1rem;
            transition: all 0.3s ease;
        }

        .input-box:focus-within {
            border-color: #667eea;
            box-shadow: 0 0 12px rgba(102, 126, 234, 0.15);
        }

        .output-box {
            background: linear-gradient(to right, #eef2ff, #f5f7ff);
            border: 2px solid #c7d2fe;
            border-radius: 16px;
            padding: 1rem;
            min-height: 100px;
        }

        .mic-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 8px 16px rgba(118, 75, 162, 0.25);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .mic-btn:active {
            transform: scale(0.9);
        }

        .mic-active {
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%) !important;
            animation: pulse-ring 1.5s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 8, 68, 0.6); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(255, 8, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 8, 68, 0); }
        }

        textarea {
            width: 100%;
            background: transparent;
            font-size: 1.125rem;
            font-weight: 600;
            color: #1f2937;
            outline: none;
            resize: none;
            border: none;
            min-height: 80px;
            line-height: 1.5;
        }

        .credit-badge {
            margin-top: 1.5rem;
            background: rgba(0, 0, 0, 0.15);
            color: white;
            padding: 0.5rem 1.25rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 400px) {
            .glass-card {
                padding: 1.25rem;
            }
            textarea {
                font-size: 1rem;
            }
            .mic-btn {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600">ટ્રાન્સલેટર</h1>
            <button id="clearBtn" class="bg-red-100 text-red-600 px-4 py-1.5 rounded-full text-xs font-black hover:bg-red-200 transition-all active:scale-95">
                સાફ કરો
            </button>
        </div>

        <div class="flex flex-col gap-4">
            <!-- Gujarati Input -->
            <div class="input-box">
                <p class="text-[10px] font-black text-indigo-400 uppercase mb-2 tracking-widest">ગુજરાતી</p>
                <textarea id="gujaratiInput" placeholder="અહીં લખો અથવા બોલો..."></textarea>
            </div>

            <!-- English Translation -->
            <div class="output-box">
                <p class="text-[10px] font-black text-purple-400 uppercase mb-2 tracking-widest">English Translation</p>
                <div id="englishText" class="text-xl text-indigo-900 font-extrabold leading-snug italic">...</div>
            </div>
        </div>

        <div class="flex flex-col items-center gap-3">
            <button id="micBtn" class="mic-btn text-white outline-none">
                <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m8 0h-4m-4-8a3 3 0 013-3V5a3 3 0 116 0v6a3 3 0 01-3 3 3 3 0 01-3-3z" />
                </svg>
            </button>
            <div id="statusLabel" class="flex items-center gap-2 text-[10px] font-black text-gray-500 bg-white/50 px-4 py-1.5 rounded-full uppercase tracking-widest">
                <span id="statusDot" class="h-2 w-2 rounded-full bg-gray-300"></span>
                તૈયાર છે
            </div>
        </div>
    </div>

    <!-- Credit Footer -->
    <div class="credit-badge">
        Created by <span class="text-white font-black underline decoration-indigo-300">Rajesh Barochia</span>
    </div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const clearBtn = document.getElementById('clearBtn');
        const gujaratiInput = document.getElementById('gujaratiInput');
        const englishText = document.getElementById('englishText');
        const statusLabel = document.getElementById('statusLabel');
        const statusDot = document.getElementById('statusDot');

        const apiKey = ""; 

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'gu-IN';
            recognition.interimResults = true;
            recognition.continuous = false;

            recognition.onresult = (event) => {
                let interim = '';
                let final = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) final += event.results[i][0].transcript;
                    else interim += event.results[i][0].transcript;
                }
                gujaratiInput.value = final || interim;
                if (final !== "") performTranslation(final);
            };

            recognition.onend = () => {
                isListening = false;
                micBtn.classList.remove('mic-active');
                if (gujaratiInput.value === "") updateStatus("ready");
            };
        }

        let isListening = false;
        let debounceTimer;

        gujaratiInput.oninput = () => {
            clearTimeout(debounceTimer);
            if (gujaratiInput.value.trim() !== "") {
                updateStatus("typing");
                debounceTimer = setTimeout(() => {
                    performTranslation(gujaratiInput.value);
                }, 1000);
            } else {
                englishText.innerText = "...";
                updateStatus("ready");
            }
        };

        micBtn.onclick = () => {
            if (!recognition) {
                alert("તમારું બ્રાઉઝર વોઇસ રેકોગ્નિશન સપોર્ટ કરતું નથી.");
                return;
            }
            if (isListening) {
                recognition.stop();
            } else {
                startRecording();
            }
        };

        clearBtn.onclick = () => {
            gujaratiInput.value = "";
            englishText.innerText = "...";
            updateStatus("ready");
            window.speechSynthesis.cancel();
            if(isListening && recognition) recognition.stop();
        };

        function updateStatus(state) {
            statusDot.className = "h-2 w-2 rounded-full transition-all";
            
            switch(state) {
                case "listening":
                    statusDot.classList.add('bg-red-500', 'animate-pulse');
                    statusLabel.childNodes[2].nodeValue = "સાંભળી રહ્યો છું...";
                    break;
                case "translating":
                    statusDot.classList.add('bg-indigo-500', 'animate-bounce');
                    statusLabel.childNodes[2].nodeValue = "ભાષાંતર...";
                    break;
                case "typing":
                    statusDot.classList.add('bg-gray-400');
                    statusLabel.childNodes[2].nodeValue = "લખી રહ્યા છો";
                    break;
                case "ready":
                    statusDot.classList.add('bg-gray-300');
                    statusLabel.childNodes[2].nodeValue = "તૈયાર છે";
                    break;
                case "done":
                    statusDot.classList.add('bg-emerald-500');
                    statusLabel.childNodes[2].nodeValue = "પૂર્ણ!";
                    break;
                case "error":
                    statusDot.classList.add('bg-orange-500');
                    statusLabel.childNodes[2].nodeValue = "ફરી ટ્રાય કરો";
                    break;
            }
        }

        function startRecording() {
            try {
                recognition.start();
                isListening = true;
                micBtn.classList.add('mic-active');
                updateStatus("listening");
                gujaratiInput.value = "";
                englishText.innerText = "...";
            } catch (e) { console.error(e); }
        }

        async function performTranslation(text, retryCount = 0) {
            updateStatus("translating");
            const systemPrompt = "Translate Gujarati to natural English. Output ONLY translation.";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                if (!response.ok) throw new Error('Network error');

                const data = await response.json();
                const translated = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();

                if (translated) {
                    englishText.innerText = translated;
                    updateStatus("done");
                    const speech = new SpeechSynthesisUtterance(translated);
                    speech.lang = 'en-US';
                    window.speechSynthesis.speak(speech);
                }
            } catch (err) {
                if (retryCount < 2) {
                    setTimeout(() => performTranslation(text, retryCount + 1), 1000);
                } else {
                    updateStatus("error");
                }
            }
        }
    </script>
</body>
</html>
