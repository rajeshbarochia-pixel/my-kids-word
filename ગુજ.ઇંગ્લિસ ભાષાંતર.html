<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>કલરફૂલ ગુજરાતી ટ્રાન્સલેટર</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans Gujarati', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 95%;
            max-width: 500px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .input-box {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .input-box:focus-within {
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.2);
        }

        .output-box {
            background: linear-gradient(to right, #e0e7ff, #f0f4ff);
            border: 2px solid #c7d2fe;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            box-shadow: 0 4px 15px rgba(56, 249, 215, 0.4);
        }

        .mic-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mic-btn:active {
            transform: scale(0.9);
        }

        .mic-active {
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%) !important;
            animation: pulse-ring 1.5s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 8, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(255, 8, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 8, 68, 0); }
        }

        textarea::-webkit-scrollbar {
            width: 4px;
        }

        textarea::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4">

    <div class="glass-card">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600">ટ્રાન્સલેટર</h1>
            <button id="clearBtn" class="bg-red-100 text-red-600 px-5 py-2 rounded-full text-sm font-bold hover:bg-red-200 transition-all active:scale-95 shadow-sm">
                સાફ કરો
            </button>
        </div>

        <div class="space-y-6 mb-8">
            <!-- Gujarati Input -->
            <div class="relative p-5 rounded-2xl input-box shadow-sm">
                <p class="text-[11px] font-black text-indigo-500 uppercase mb-3 tracking-[0.2em]">ગુજરાતી (ટાઈપ અથવા બોલો)</p>
                <textarea id="gujaratiInput" class="w-full bg-transparent text-xl text-gray-800 font-bold outline-none resize-none min-h-[90px]" placeholder="અહીં લખો..."></textarea>
            </div>

            <!-- English Translation -->
            <div class="relative p-5 rounded-2xl output-box shadow-sm">
                <p class="text-[11px] font-black text-purple-500 uppercase mb-3 tracking-[0.2em]">અંગ્રેજી ભાષાંતર</p>
                <div id="englishText" class="text-2xl text-indigo-900 font-extrabold leading-tight italic">...</div>
            </div>
        </div>

        <div class="flex flex-col items-center space-y-5">
            <button id="micBtn" class="mic-btn text-white p-8 rounded-full outline-none shadow-2xl">
                <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m8 0h-4m-4-8a3 3 0 013-3V5a3 3 0 116 0v6a3 3 0 01-3 3 3 3 0 01-3-3z" />
                </svg>
            </button>
            <div id="statusLabel" class="flex items-center gap-3 text-sm font-black text-gray-500 bg-white/50 backdrop-blur-md px-6 py-2 rounded-full uppercase tracking-widest shadow-inner transition-all">
                <span id="statusDot" class="h-3 w-3 rounded-full bg-gray-300"></span>
                તૈયાર છે
            </div>
        </div>
    </div>

    <!-- Credit Footer -->
    <div class="mt-8 text-white/80 text-sm font-bold tracking-widest bg-black/10 px-6 py-2 rounded-full backdrop-blur-sm">
        Created by <span class="text-white font-black underline decoration-indigo-400">Rajesh Barochia</span>
    </div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const clearBtn = document.getElementById('clearBtn');
        const gujaratiInput = document.getElementById('gujaratiInput');
        const englishText = document.getElementById('englishText');
        const statusLabel = document.getElementById('statusLabel');
        const statusDot = document.getElementById('statusDot');

        const apiKey = ""; 

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'gu-IN';
        recognition.interimResults = true;
        recognition.continuous = false;

        let isListening = false;
        let debounceTimer;

        gujaratiInput.oninput = () => {
            clearTimeout(debounceTimer);
            if (gujaratiInput.value.trim() !== "") {
                updateStatus("typing");
                debounceTimer = setTimeout(() => {
                    performTranslation(gujaratiInput.value);
                }, 1000);
            } else {
                englishText.innerText = "...";
                updateStatus("ready");
            }
        };

        micBtn.onclick = () => {
            if (isListening) {
                recognition.stop();
            } else {
                startRecording();
            }
        };

        clearBtn.onclick = () => {
            gujaratiInput.value = "";
            englishText.innerText = "...";
            updateStatus("ready");
            window.speechSynthesis.cancel();
            if(isListening) recognition.stop();
        };

        function updateStatus(state) {
            statusLabel.className = "flex items-center gap-3 text-sm font-black bg-white/50 backdrop-blur-md px-6 py-2 rounded-full uppercase tracking-widest shadow-inner transition-all";
            statusDot.className = "h-3 w-3 rounded-full transition-all";
            
            switch(state) {
                case "listening":
                    statusLabel.classList.add('text-red-600');
                    statusDot.classList.add('bg-red-500', 'animate-pulse');
                    statusLabel.childNodes[2].nodeValue = "સાંભળી રહ્યો છું...";
                    break;
                case "translating":
                    statusLabel.classList.add('text-indigo-600');
                    statusDot.classList.add('bg-indigo-500', 'animate-bounce');
                    statusLabel.childNodes[2].nodeValue = "ભાષાંતર...";
                    break;
                case "typing":
                    statusLabel.classList.add('text-gray-600');
                    statusDot.classList.add('bg-gray-400');
                    statusLabel.childNodes[2].nodeValue = "લખી રહ્યા છો";
                    break;
                case "ready":
                    statusLabel.classList.add('text-gray-500');
                    statusDot.classList.add('bg-gray-300');
                    statusLabel.childNodes[2].nodeValue = "તૈયાર છે";
                    break;
                case "done":
                    statusLabel.classList.add('text-emerald-600');
                    statusDot.classList.add('bg-emerald-500');
                    statusLabel.childNodes[2].nodeValue = "પૂર્ણ!";
                    break;
                case "error":
                    statusLabel.classList.add('text-orange-600');
                    statusDot.classList.add('bg-orange-500');
                    statusLabel.childNodes[2].nodeValue = "ફરી પ્રયાસ કરો";
                    break;
            }
        }

        function startRecording() {
            try {
                recognition.start();
                isListening = true;
                micBtn.classList.add('mic-active');
                updateStatus("listening");
                gujaratiInput.value = "";
                englishText.innerText = "...";
            } catch (e) { console.error(e); }
        }

        recognition.onresult = (event) => {
            let interim = '';
            let final = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) final += event.results[i][0].transcript;
                else interim += event.results[i][0].transcript;
            }
            gujaratiInput.value = final || interim;
            if (final !== "") performTranslation(final);
        };

        recognition.onend = () => {
            isListening = false;
            micBtn.classList.remove('mic-active');
            if (gujaratiInput.value === "") updateStatus("ready");
        };

        async function performTranslation(text, retryCount = 0) {
            updateStatus("translating");
            const systemPrompt = "Translate Gujarati to natural English. Output ONLY translation.";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                if (!response.ok) throw new Error('Network error');

                const data = await response.json();
                const translated = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();

                if (translated) {
                    englishText.innerText = translated;
                    updateStatus("done");
                    const speech = new SpeechSynthesisUtterance(translated);
                    speech.lang = 'en-US';
                    window.speechSynthesis.speak(speech);
                }
            } catch (err) {
                if (retryCount < 2) {
                    setTimeout(() => performTranslation(text, retryCount + 1), 1000);
                } else {
                    updateStatus("error");
                }
            }
        }
    </script>
</body>
</html>
